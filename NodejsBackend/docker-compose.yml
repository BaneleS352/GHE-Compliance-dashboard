version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ghe_compliance
      POSTGRES_USER: ghe_user
      POSTGRES_PASSWORD: ghe_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

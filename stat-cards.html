<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stat Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1013;
    --bg2:#1a1b21;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    padding:60px 40px;
    background:radial-gradient(1200px 600px at 20% 0%, #23222c 0%, var(--bg) 55%), var(--bg);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .row{ display:flex; gap:22px; flex-wrap:wrap; max-width:1200px; margin:0 auto; }
  .card{
    position:relative;
    width:272px;
    height:148px;
    border-radius:20px;
    overflow:hidden;
    padding:20px 22px;
    isolation:isolate;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 -20px 40px rgba(0,0,0,0.15) inset,
      0 20px 40px -12px rgba(0,0,0,0.55),
      0 8px 16px -8px rgba(0,0,0,0.4);
    transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
    cursor:default;
  }
  .card::before{
    content:"";
    position:absolute; inset:0;
    border-radius:inherit;
    padding:1px;
    background:linear-gradient(160deg,rgba(255,255,255,0.35),rgba(255,255,255,0.02) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.12));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    pointer-events:none;
    z-index:5;
  }
  .card::after{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(120% 80% at 100% 0%, rgba(255,255,255,0.22), transparent 55%),
      radial-gradient(80% 60% at 0% 100%, rgba(0,0,0,0.35), transparent 60%);
    mix-blend-mode:overlay;
    pointer-events:none;
    z-index:3;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 -20px 40px rgba(0,0,0,0.15) inset,
      0 28px 50px -12px rgba(0,0,0,0.65),
      0 10px 20px -8px rgba(0,0,0,0.5);
  }
  .head{ display:flex; align-items:center; gap:8px; position:relative; z-index:4; }
  .icon-chip{
    width:26px; height:26px; border-radius:8px;
    display:grid; place-items:center;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.22);
    backdrop-filter:blur(6px);
    color:#fff;
  }
  .label{
    font-size:12.5px;
    font-weight:600;
    color:rgba(255,255,255,0.85);
    letter-spacing:0.4px;
    text-transform:uppercase;
  }
  .value{
    font-size:40px;
    font-weight:700;
    color:#fff;
    margin-top:10px;
    line-height:1;
    letter-spacing:-0.02em;
    position:relative;
    z-index:4;
    text-shadow:0 2px 12px rgba(0,0,0,0.25);
  }
  .delta{
    display:inline-flex; align-items:center; gap:4px;
    margin-top:10px;
    padding:3px 8px;
    border-radius:999px;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.18);
    font-size:11px; font-weight:600;
    color:#fff;
    position:relative; z-index:4;
    backdrop-filter:blur(6px);
  }
  .delta.pos{ background:rgba(140,255,201,0.18); border-color:rgba(140,255,201,0.35); color:#c8ffe4; }
  .delta.neg{ background:rgba(255,140,140,0.16); border-color:rgba(255,140,140,0.3); color:#ffd6d6; }

  .decor{ position:absolute; right:-6px; bottom:-6px; z-index:2; pointer-events:none; }
  .grain{
    position:absolute; inset:0; z-index:1; opacity:.18; mix-blend-mode:overlay; pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.9) 1px, transparent 1px);
    background-size:3px 3px;
    -webkit-mask-image:linear-gradient(120deg, transparent 30%, black 90%);
            mask-image:linear-gradient(120deg, transparent 30%, black 90%);
  }

  .total   { background:linear-gradient(145deg,#6b3ef0 0%,#4423b8 45%,#1e1268 100%); }
  .pending { background:linear-gradient(145deg,#ffb04a 0%,#e07a0f 50%,#8a3d05 100%); }
  .approved{ background:linear-gradient(145deg,#0c8f6b 0%,#12b380 55%,#1de29a 100%); }
  .totalvalue{ background:linear-gradient(145deg,#ff6aa7 0%,#a13cd6 50%,#4a1f8f 100%); }

  @keyframes floaty { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-3px);} }
  .decor.float{ animation:floaty 6s ease-in-out infinite; }
  @keyframes dash { to { stroke-dashoffset:-400; } }
  .stream{ stroke-dasharray:6 10; animation:dash 12s linear infinite; }

  @media (max-width:640px){
    body{ padding:24px 16px; }
    .card{ width:100%; }
  }
</style>
</head>
<body>
<div class="row">

  <!-- TOTAL -->
  <div class="card total">
    <div class="grain"></div>
    <div class="head">
      <div class="icon-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M4 10h16M10 4v16"/></svg>
      </div>
      <div class="label">Total</div>
    </div>
    <div class="value">4</div>
    <span class="delta pos">▲ 12%</span>
    <svg class="decor float" width="170" height="110" viewBox="0 0 170 110" fill="none">
      <path class="stream" d="M-4 78 C 12 60, 22 90, 34 74 C 46 58, 56 44, 70 58 C 84 72, 92 78, 104 60 C 116 42, 128 40, 142 52 C 156 64, 166 54, 176 42"
            stroke="rgba(220,205,255,0.7)" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M-4 78 C 12 60, 22 90, 34 74 C 46 58, 56 44, 70 58 C 84 72, 92 78, 104 60 C 116 42, 128 40, 142 52 C 156 64, 166 54, 176 42 L 176 110 L -4 110 Z"
            fill="rgba(180,150,255,0.12)"/>
    </svg>
  </div>

  <!-- PENDING -->
  <div class="card pending">
    <div class="grain"></div>
    <div class="head">
      <div class="icon-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      </div>
      <div class="label">Pending</div>
    </div>
    <div class="value">3</div>
    <span class="delta">Awaiting review</span>
    <svg class="decor" width="160" height="105" viewBox="0 0 160 105" fill="none">
      <defs>
        <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fff2cf" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#ffb347" stop-opacity="0.25"/>
        </linearGradient>
        <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe4b0" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ffa02b" stop-opacity="0.2"/>
        </linearGradient>
      </defs>
      <g>
        <rect x="18" y="62" width="14" height="30" rx="4" fill="url(#barA)"/>
        <rect x="38" y="46" width="14" height="46" rx="4" fill="url(#barB)"/>
        <rect x="58" y="22" width="14" height="70" rx="4" fill="url(#barA)"/>
        <rect x="78" y="50" width="14" height="42" rx="4" fill="url(#barB)"/>
        <rect x="98" y="34" width="14" height="58" rx="4" fill="url(#barA)"/>
        <rect x="118" y="14" width="14" height="78" rx="4" fill="url(#barB)"/>
        <rect x="138" y="40" width="14" height="52" rx="4" fill="url(#barA)"/>
      </g>
      <line x1="14" y1="94" x2="156" y2="94" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    </svg>
  </div>

  <!-- APPROVED -->
  <div class="card approved">
    <div class="grain"></div>
    <div class="head">
      <div class="icon-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4L19 7"/></svg>
      </div>
      <div class="label">Approved</div>
    </div>
    <div class="value">1</div>
    <span class="delta pos">25% of total</span>
    <svg class="decor" width="130" height="130" viewBox="0 0 130 130">
      <defs>
        <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#e6fff4"/><stop offset="100%" stop-color="#20e0a0"/>
        </linearGradient>
      </defs>
      <circle cx="65" cy="65" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="11"/>
      <circle cx="65" cy="65" r="42" fill="none" stroke="url(#ringG)" stroke-width="11"
              stroke-dasharray="263.9" stroke-dashoffset="198" stroke-linecap="round"
              transform="rotate(-90 65 65)"/>
      <text x="65" y="70" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Inter">25%</text>
    </svg>
  </div>

  <!-- TOTAL VALUE -->
  <div class="card totalvalue">
    <div class="grain"></div>
    <div class="head">
      <div class="icon-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M17 7H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      </div>
      <div class="label">Total Value</div>
    </div>
    <div class="value">R 37K</div>
    <span class="delta pos">▲ R 4.2K</span>
    <svg class="decor float" width="175" height="110" viewBox="0 0 175 110" fill="none">
      <defs>
        <linearGradient id="fillP" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,140,190,0.35)"/>
          <stop offset="100%" stop-color="rgba(255,140,190,0)"/>
        </linearGradient>
      </defs>
      <path d="M-4 72 C 12 60, 22 84, 34 72 C 46 60, 54 46, 66 40 C 76 34, 82 40, 90 50
               C 100 62, 108 44, 118 34 C 128 24, 138 30, 148 44 C 158 58, 168 50, 180 40 L180 110 L-4 110 Z"
            fill="url(#fillP)"/>
      <path d="M-4 72 C 12 60, 22 84, 34 72 C 46 60, 54 46, 66 40 C 76 34, 82 40, 90 50
               C 100 62, 108 44, 118 34 C 128 24, 138 30, 148 44 C 158 58, 168 50, 180 40"
            stroke="rgba(255,220,240,0.85)" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <circle cx="118" cy="34" r="10" fill="#ff5f8f" opacity="0.25"/>
      <circle cx="118" cy="34" r="4" fill="#fff"/>
      <circle cx="118" cy="34" r="2" fill="#ff5f8f"/>
    </svg>
  </div>

</div>
</body>
</html>
